name: Eenmalige backfill (alles vanaf 1 jan 2025)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Data-map aanmaken
        run: mkdir -p data

      - name: Backfill draaien
        run: python backfill_alles.py

      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: eenmalige backfill vanaf 2025-01-01"
          git push
